name: redirect-pr-to-forgejo

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  issues: write
  pull-requests: write

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const forgejoUrl = 'https://git.barrettruth.com/barrettruth/cp.nvim';
            const body = [
              'Thanks for the pull request. This GitHub repository is a compatibility mirror.',
              '',
              `Please open pull requests on Forgejo instead: ${forgejoUrl}/pulls`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed',
            });
